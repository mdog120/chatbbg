<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBBG</title>

  <!-- soft, editorial-ish fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #ffffff;
      --ink: #1f1a22;
      --muted: #6f6470;
      --line: rgba(31, 26, 34, .12);

      --pink: #ff5fb6;
      --pink2:#ff8ad0;
      --pinkWash: rgba(255, 95, 182, .10);

      --shadow: 0 18px 40px rgba(31, 26, 34, .10);
      --radius: 18px;
      --radius2: 28px;

      --serif: "Fraunces", ui-serif, Georgia, serif;
      --sans: "DM Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      overflow:hidden;
    }

    /* subtle page texture */
    .page{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      background:
        radial-gradient(900px 500px at 15% 15%, rgba(255, 95, 182, .06), transparent 60%),
        radial-gradient(900px 500px at 85% 25%, rgba(255, 138, 208, .06), transparent 60%),
        radial-gradient(800px 450px at 55% 95%, rgba(255, 95, 182, .04), transparent 55%),
        #fff;
    }

    .shell{
      width: min(980px, 100%);
      height: min(780px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(10px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      position:relative;
    }

    /* top bar — clean + editorial */
    header{
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--line);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      background: rgba(255,255,255,.82);
    }

    .title{
      min-width:0;
    }
    .title h1{
      margin:0;
      font-family: var(--serif);
      font-weight: 600;
      letter-spacing: .2px;
      font-size: 26px;
      line-height: 1.05;
    }
    .title p{
      margin:8px 0 0;
      font-size: 13px;
      color: var(--muted);
      max-width: 52ch;
    }

    .pills{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: .2px;
      box-shadow: 0 10px 18px rgba(31,26,34,.06);
      user-select:none;
    }
    .pill strong{ font-weight:700; }

    /* chat area */
    .chat{
      flex:1;
      overflow:auto;
      padding: 22px;
      display:flex;
      flex-direction:column;
      gap:14px;
      scroll-behavior:smooth;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:flex-end;
    }
    .row.you{ justify-content:flex-end; }

    .bubble{
      max-width: min(720px, 88%);
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      line-height: 1.45;
      font-size: 15px;
      white-space: pre-wrap;
      position:relative;
    }

    /* ChatBBG bubble: soft wash, minimal */
    .bubble.bbg{
      background: linear-gradient(180deg, #fff, var(--pinkWash));
      border-color: rgba(255,95,182,.20);
    }

    /* User bubble: clean dark text, soft pink outline (not a big pink blob) */
    .bubble.you{
      background: #fff;
      border-color: rgba(255,95,182,.45);
      box-shadow: 0 10px 18px rgba(255,95,182,.10);
    }

    .meta{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .dotsep{
      width:3px;height:3px;border-radius:50%;
      background: rgba(111,100,112,.7);
      display:inline-block;
    }

    /* typing */
    .typing{
      display:inline-flex;
      gap:6px;
      align-items:center;
      padding:2px 0;
    }
    .td{
      width:7px;height:7px;border-radius:999px;
      background: var(--pink);
      opacity:.55;
      animation: bounce 1s infinite ease-in-out;
    }
    .td:nth-child(2){ animation-delay:.15s; }
    .td:nth-child(3){ animation-delay:.3s; }
    @keyframes bounce{
      0%,100%{ transform: translateY(0); opacity:.45; }
      50%{ transform: translateY(-4px); opacity:1; }
    }

    /* composer */
    .composer{
      padding: 16px 22px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.88);
    }
    .box{
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 10px 10px 14px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background: #fff;
      box-shadow: 0 14px 26px rgba(31,26,34,.08);
    }
    textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.45;
      padding: 8px 4px;
      max-height: 150px;
      background: transparent;
    }
    .send{
      width: 46px;
      height: 46px;
      border:none;
      cursor:pointer;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      color:#fff;
      font-weight: 800;
      box-shadow: 0 14px 24px rgba(255,95,182,.22);
      transition: transform .08s ease;
    }
    .send:active{ transform: translateY(1px); }

    .footerline{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-size: 12px;
      color: var(--muted);
    }
    .disclaimer{
      text-align:center;
      width:100%;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 640px){
      .page{ padding:14px; }
      header{ padding:18px 16px 12px; }
      .chat{ padding:16px; }
      .composer{ padding:14px 16px 16px; }
      .pills{ display:none; }
      .title p{ max-width: 42ch; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="shell">
      <header>
        <div class="title">
          <h1>ChatBBG</h1>
          <p>Soft advice + cute help ✿ hair, makeup, study, healthy habits, and relationships.</p>
        </div>

        <div class="pills" aria-hidden="true">
          <div class="pill"><strong>hair</strong></div>
          <div class="pill"><strong>makeup</strong></div>
          <div class="pill"><strong>weight</strong></div>
          <div class="pill"><strong>study</strong></div>
          <div class="pill"><strong>boy tips</strong></div>
        </div>
      </header>

      <section class="chat" id="chat"></section>

      <div class="composer">
        <div class="box">
          <textarea id="input" rows="1" placeholder="Message ChatBBG…"></textarea>
          <button class="send" id="sendBtn" title="Send">➤</button>
        </div>

        <div class="footerline">
          <span>Enter = send • Shift+Enter = new line</span>
          <span id="modeHint">Replies are not saved</span>
        </div>

        <div class="disclaimer">ChatBBG can make mistakes. Check important info.</div>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function autoGrow(el){
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 150) + "px";
    }
    input.addEventListener("input", () => autoGrow(input));

    function addBubble(text, who="bbg"){
      const row = document.createElement("div");
      row.className = "row " + (who === "you" ? "you" : "bbg");

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (who === "you" ? "you" : "bbg");
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      const name = document.createElement("span");
      name.textContent = who === "you" ? "You" : "ChatBBG";
      const sep = document.createElement("span");
      sep.className = "dotsep";
      const time = document.createElement("span");
      time.textContent = "just now";

      meta.appendChild(name);
      meta.appendChild(sep);
      meta.appendChild(time);
      bubble.appendChild(meta);

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping(){
      const row = document.createElement("div");
      row.className = "row bbg";
      row.id = "typingRow";

      const bubble = document.createElement("div");
      bubble.className = "bubble bbg";
      bubble.innerHTML = `
        <span class="typing" aria-label="ChatBBG is typing">
          <span class="td"></span><span class="td"></span><span class="td"></span>
        </span>
        <div class="meta"><span>ChatBBG</span><span class="dotsep"></span><span>typing…</span></div>
      `;
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping(){
      document.getElementById("typingRow")?.remove();
    }

    // prompt recognition (simple + expand anytime)
    const routes = [
      { name: "hair tips", keywords: ["hair","frizz","curl","curly","coily","straight","shampoo","conditioner","split ends","oily scalp","dry scalp","heat damage"] },
      { name: "makeup tips", keywords: ["makeup","foundation","concealer","blush","mascara","eyeliner","lip","brows","contour","highlighter","primer","setting spray"] },
      { name: "weight management", keywords: ["weight","lose","fat","calorie","diet","workout","gym","scale","cut","bulk","steps","protein"] },
      { name: "studying help", keywords: ["study","studying","homework","assignment","exam","test","quiz","notes","focus","procrastinate","school","revision"] },
      { name: "boy tips", keywords: ["boy","crush","dating","relationship","situationship","text him","text her","ghosting","red flag","green flag","talking stage"] },
    ];

    function detectCategory(text){
      const t = text.toLowerCase();
      let best = { name:"general", score:0 };
      for(const r of routes){
        let score = 0;
        for(const k of r.keywords) if(t.includes(k)) score++;
        if(score > best.score) best = { name:r.name, score };
      }
      return best.score ? best.name : "general";
    }

    function replyFor(category){
      const safety = "If anything feels serious/unsafe, please talk to a trusted adult or a professional, ok? 💗";

      if(category === "hair tips"){
        return [
          "hair tips time ✿",
          "Tell me your hair type (straight/wavy/curly/coily) + what’s wrong (frizz, dryness, oily scalp).",
          "",
          "Quick fixes:",
          "• frizz: microfiber towel + leave-in + avoid brushing dry curls",
          "• dry ends: trim + oil only on ends (not scalp)",
          "• oily scalp: shampoo twice, condition only mid-length to ends",
          "• heat: heat protectant + lower temp + fewer passes"
        ].join("\n");
      }

      if(category === "makeup tips"){
        return [
          "ok pretty ✿ makeup help!",
          "What’s your skin type (oily/dry/combo) + vibe (natural, soft glam, full glam)?",
          "",
          "Quick wins:",
          "• base looking cakey: use less + damp sponge + set only where shiny",
          "• separation: prep with moisturizer, let it sink in 2–3 mins",
          "• smudgy mascara: light powder under eyes or waterproof mascara",
          "• blush: higher on cheeks = lifted look"
        ].join("\n");
      }

      if(category === "weight management"){
        return [
          "gentle habits mode ✿ (not medical advice)",
          "If you’re under 18: focus on strength, energy, and balance—not extreme dieting.",
          "",
          "Basics that actually work:",
          "• plate: protein + carbs + colorful veg + healthy fats",
          "• sleep + water = underrated glow-up",
          "• move in a fun way 3–5x/week (walk, dance, sport)",
          "• avoid extremes—small steps stay longer",
          "",
          safety
        ].join("\n");
      }

      if(category === "studying help"){
        return [
          "study mode ✿",
          "Tell me the subject + due date + what you don’t get yet.",
          "",
          "Fast plan:",
          "1) 25 min focus + 5 min break (x3)",
          "2) tiny checklist (3–5 tasks)",
          "3) active recall: explain it like you’re teaching",
          "4) practice questions > rereading"
        ].join("\n");
      }

      if(category === "boy tips"){
        return [
          "ok bestie ✿ relationship tea, but wise",
          "What happened + what do you WANT (friends, talking, dating)?",
          "",
          "Quick rules:",
          "• if they like you, it won’t feel confusing 24/7",
          "• match energy—don’t chase",
          "• green flags: consistent, respectful, clear",
          "• red flags: hot/cold, pressures you, rude",
          "",
          safety
        ].join("\n");
      }

      return [
        "hiii ✿",
        "I can do: hair, makeup, healthy habits, studying, or boy tips.",
        "Tell me what you need + a tiny bit of context, and I’ll make it easy + cute."
      ].join("\n");
    }

    function send(){
      const text = input.value.trim();
      if(!text) return;

      addBubble(text, "you");
      input.value = "";
      autoGrow(input);

      addTyping();
      const category = detectCategory(text);

      setTimeout(() => {
        removeTyping();
        addBubble(replyFor(category), "bbg");
      }, 420);
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    // intro
    addBubble("hi bestie ✿ i’m ChatBBG.\ntry: “hair tips for frizz” or “study plan for a bio test” or “makeup tips for oily skin”.", "bbg");
  </script>
</body>
</html>
