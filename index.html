<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBBG</title>

  <!-- clean editorial fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #ffffff;
      --ink: #1f1a22;
      --muted: #6f6470;
      --line: rgba(31, 26, 34, .12);

      --pink: #ff5fb6;
      --pink2:#ff8ad0;
      --pinkWash: rgba(255, 95, 182, .10);

      --shadow: 0 18px 40px rgba(31, 26, 34, .10);
      --radius: 18px;
      --radius2: 28px;

      --serif: "Fraunces", ui-serif, Georgia, serif;
      --sans: "DM Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      overflow:hidden;
    }

    .page{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      background:
        radial-gradient(900px 520px at 15% 15%, rgba(255, 95, 182, .06), transparent 60%),
        radial-gradient(900px 520px at 85% 25%, rgba(255, 138, 208, .06), transparent 60%),
        radial-gradient(800px 460px at 55% 95%, rgba(255, 95, 182, .04), transparent 55%),
        #fff;
    }

    .shell{
      width: min(980px, 100%);
      height: min(780px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(10px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    header{
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--line);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      background: rgba(255,255,255,.82);
    }

    .title{
      min-width:0;
    }
    .title h1{
      margin:0;
      font-family: var(--serif);
      font-weight: 600;
      letter-spacing: .2px;
      font-size: 26px;
      line-height: 1.05;
    }
    .title p{
      margin:8px 0 0;
      font-size: 13px;
      color: var(--muted);
      max-width: 60ch;
    }

    .chat{
      flex:1;
      overflow:auto;
      padding: 22px;
      display:flex;
      flex-direction:column;
      gap:14px;
      scroll-behavior:smooth;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:flex-end;
    }
    .row.you{ justify-content:flex-end; }

    .bubble{
      max-width: min(720px, 88%);
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      line-height: 1.45;
      font-size: 15px;
      white-space: pre-wrap;
      position:relative;
    }

    .bubble.bbg{
      background: linear-gradient(180deg, #fff, var(--pinkWash));
      border-color: rgba(255,95,182,.20);
    }

    .bubble.you{
      background: #fff;
      border-color: rgba(255,95,182,.45);
      box-shadow: 0 10px 18px rgba(255,95,182,.10);
    }

    .meta{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .dotsep{
      width:3px;height:3px;border-radius:50%;
      background: rgba(111,100,112,.7);
      display:inline-block;
    }

    .typing{
      display:inline-flex;
      gap:6px;
      align-items:center;
      padding:2px 0;
    }
    .td{
      width:7px;height:7px;border-radius:999px;
      background: var(--pink);
      opacity:.55;
      animation: bounce 1s infinite ease-in-out;
    }
    .td:nth-child(2){ animation-delay:.15s; }
    .td:nth-child(3){ animation-delay:.3s; }
    @keyframes bounce{
      0%,100%{ transform: translateY(0); opacity:.45; }
      50%{ transform: translateY(-4px); opacity:1; }
    }

    .composer{
      padding: 16px 22px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.88);
    }
    .box{
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 10px 10px 14px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background: #fff;
      box-shadow: 0 14px 26px rgba(31,26,34,.08);
    }
    textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.45;
      padding: 8px 4px;
      max-height: 150px;
      background: transparent;
    }
    .send{
      width: 46px;
      height: 46px;
      border:none;
      cursor:pointer;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      color:#fff;
      font-weight: 800;
      box-shadow: 0 14px 24px rgba(255,95,182,.22);
      transition: transform .08s ease;
    }
    .send:active{ transform: translateY(1px); }

    .footerline{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-size: 12px;
      color: var(--muted);
    }
    .disclaimer{
      text-align:center;
      width:100%;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 640px){
      .page{ padding:14px; }
      header{ padding:18px 16px 12px; }
      .chat{ padding:16px; }
      .composer{ padding:14px 16px 16px; }
      .title p{ max-width: 42ch; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="shell">
      <header>
        <div class="title">
          <h1>ChatBBG</h1>
          <p>Ask me literally anything ✿ I’m cute, a bit sassy, and occasionally wrong (like all icons).</p>
        </div>
      </header>

      <section class="chat" id="chat"></section>

      <div class="composer">
        <div class="box">
          <textarea id="input" rows="1" placeholder="Message ChatBBG…"></textarea>
          <button class="send" id="sendBtn" title="Send">➤</button>
        </div>

        <div class="footerline">
          <span>Enter = send • Shift+Enter = new line</span>
          <span>No chat history saved</span>
        </div>

        <div class="disclaimer">ChatBBG can make mistakes. Check important info.</div>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    // ---------- UI helpers ----------
    function autoGrow(el){
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 150) + "px";
    }
    input.addEventListener("input", () => autoGrow(input));

    function addBubble(text, who="bbg"){
      const row = document.createElement("div");
      row.className = "row " + (who === "you" ? "you" : "bbg");

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (who === "you" ? "you" : "bbg");
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      const name = document.createElement("span");
      name.textContent = who === "you" ? "You" : "ChatBBG";
      const sep = document.createElement("span");
      sep.className = "dotsep";
      const time = document.createElement("span");
      time.textContent = "just now";

      meta.appendChild(name);
      meta.appendChild(sep);
      meta.appendChild(time);
      bubble.appendChild(meta);

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping(){
      const row = document.createElement("div");
      row.className = "row bbg";
      row.id = "typingRow";

      const bubble = document.createElement("div");
      bubble.className = "bubble bbg";
      bubble.innerHTML = `
        <span class="typing" aria-label="ChatBBG is typing">
          <span class="td"></span><span class="td"></span><span class="td"></span>
        </span>
        <div class="meta"><span>ChatBBG</span><span class="dotsep"></span><span>typing…</span></div>
      `;
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping(){
      document.getElementById("typingRow")?.remove();
    }

    // ---------- Tiny "more advanced AI" brain (still offline + GitHub safe) ----------
    // Utility
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function normalize(text){
      return text.toLowerCase().trim();
    }

    function wordsOf(text){
      return (text.toLowerCase().match(/[a-z']+/g) || []);
    }

    function containsAnyWord(wordSet, list){
      for(const w of list){
        if(wordSet.has(w)) return true;
      }
      return false;
    }

    // Basic math evaluator: supports + - * / ( ) decimals
    // Safety: only allow digits, operators, parentheses, whitespace, and dots.
    function tryMath(userText){
      let t = userText.toLowerCase().trim();

      // common phrasing: "what's 2+2" / "whats 10 / 2"
      t = t.replace(/^what('?s| is)\s+/i, "");
      t = t.replace(/\?+$/g, "").trim();

      const allowed = /^[0-9+\-*/().\s]+$/;
      if(!allowed.test(t)) return null;

      // must contain at least one operator to avoid answering "2026" as math
      if(!/[+\-*/]/.test(t)) return null;

      try{
        // eslint-disable-next-line no-new-func
        const result = Function("return (" + t + ")")();
        if (typeof result !== "number" || !isFinite(result)) return null;

        // pretty formatting
        const rounded = Math.abs(result) < 1e12 ? result : result;
        const out = Number.isInteger(rounded) ? String(rounded) : String(Math.round(rounded * 100000) / 100000);
        return out;
      } catch {
        return null;
      }
    }

    // Category routes (whole word + phrases)
    const routes = [
      { name: "hair tips",
        words: ["hair","frizz","curl","curly","coily","straight","shampoo","conditioner","split","ends","oily","scalp","dry","heat","damage"],
        phrases: ["split ends","oily scalp","dry scalp","heat damage"]
      },
      { name: "makeup tips",
        words: ["makeup","foundation","concealer","blush","mascara","eyeliner","lip","brows","contour","highlighter","primer","powder"],
        phrases: ["setting spray","under eye","full glam","soft glam"]
      },
      { name: "weight management",
        words: ["weight","lose","loss","fat","calorie","calories","diet","workout","gym","scale","steps","protein","cardio"],
        phrases: ["weight loss","calorie deficit","lose weight"]
      },
      { name: "studying help",
        words: ["study","studying","homework","assignment","exam","test","quiz","notes","focus","procrastinate","school","revision"],
        phrases: ["study plan","practice questions","exam tomorrow"]
      },
      { name: "boy tips",
        words: ["boy","crush","dating","date","relationship","situationship","ghosting","red","flag","green","text"],
        phrases: ["text him","text her","talking stage","red flag","green flag"]
      },
    ];

    function detectCategory(userText){
      const t = normalize(userText);
      const w = new Set(wordsOf(t));

      let best = { name:"general", score:0 };

      for(const r of routes){
        let score = 0;

        for(const ph of r.phrases){
          if(t.includes(ph)) score += 2;
        }
        for(const word of r.words){
          if(w.has(word)) score += 1;
        }

        if(score > best.score) best = { name:r.name, score };
      }

      // require at least 2 to classify, so “oh cute” won't trigger random topics
      return best.score >= 2 ? best.name : "general";
    }

    // Response banks (sassier + varied)
    const sass = {
      greetings: [
        "hi bestie ✿ what’s the vibe today?",
        "hey hey ✿ i’m here, i’m cute, and i’m listening.",
        "hiii ✿ say less. what do we need?"
      ],
      thanks: [
        "of course ✿ i was born for this (i was coded for this).",
        "anytime bestie ✿ now go be iconic.",
        "period ✿ you’re welcome."
      ],
      compliments: [
        "stoppp ✿ you’re gonna inflate my ego (and i don’t even have lungs).",
        "aw thank you ✿ i’m blushing in hex codes.",
        "you’re sweet ✿ i’ll remember this forever (until you refresh the page)."
      ],
      fallback: [
        "I can help with anything, but I do have limitations due to being created by a 15 year old.",
        "ok so… i *can* help, but i’m not a wizard. i’m a webpage. ✿",
        "i’ll do my best, but if i start acting suspicious, blame JavaScript."
      ]
    };

    function replyHair(){
      const openers = [
        "hair tips time ✿ let’s fix the drama.",
        "ok hair bestie ✿ we’re doing a mini glow-up.",
        "say less ✿ hair rehab incoming."
      ];
      const body = [
        "Tell me your hair type (straight/wavy/curly/coily) + what’s happening (frizz, dry ends, oily scalp).",
        "",
        "Quick wins:",
        "• frizz: microfiber towel + leave-in + don’t brush dry curls",
        "• dry ends: tiny trim + oil only on ends",
        "• oily scalp: shampoo twice, condition mid-length to ends only",
        "• heat: protectant + lower temp + fewer passes",
      ].join("\n");
      return pick(openers) + "\n\n" + body;
    }

    function replyMakeup(){
      const openers = [
        "makeup moment ✿ let’s make it EFFORTLESS.",
        "ok glam ✿ we’re not doing cakey today.",
        "cute ✿ makeup tips incoming like a PR package."
      ];
      const body = [
        "Tell me your skin type (oily/dry/combo) + vibe (natural, soft glam, full glam).",
        "",
        "Quick wins:",
        "• cakey base: use less + damp sponge + set only where shiny",
        "• patchy foundation: moisturize, wait 2–3 mins, then apply",
        "• smudgy mascara: light powder under eyes or waterproof",
        "• blush: higher on cheeks = lifted look",
      ].join("\n");
      return pick(openers) + "\n\n" + body;
    }

    function replyWeight(){
      const openers = [
        "ok gentle habits ✿ we’re doing healthy, not miserable.",
        "bestie ✿ balance > extremes, always.",
        "let’s do this the sane way ✿ no chaos diets."
      ];
      const body = [
        "Not medical advice, just general tips.",
        "If you’re under 18: focus on strength, energy, and balance—not extreme dieting.",
        "",
        "Basics that work:",
        "• plate: protein + carbs + colorful veg + healthy fats",
        "• sleep + water = underrated glow-up",
        "• move in a fun way 3–5x/week (walk, dance, sport)",
        "• avoid extremes—small steps stick",
        "",
        "If anything feels serious/unsafe, talk to a trusted adult or a professional 💗"
      ].join("\n");
      return pick(openers) + "\n\n" + body;
    }

    function replyStudy(){
      const openers = [
        "study mode ✿ i’m your academic sidekick.",
        "ok scholar ✿ let’s cook (respectfully).",
        "bestie ✿ we’re about to defeat procrastination."
      ];
      const body = [
        "Tell me the subject + due date + what you don’t get yet.",
        "",
        "Fast plan:",
        "1) 25 min focus + 5 min break (x3)",
        "2) tiny checklist (3–5 tasks)",
        "3) active recall: explain it like you’re teaching",
        "4) practice questions > rereading",
      ].join("\n");
      return pick(openers) + "\n\n" + body;
    }

    function replyBoy(){
      const openers = [
        "ok bestie ✿ give me the tea. i’m seated.",
        "relationship HQ ✿ let’s be smart-cute about it.",
        "boy tips ✿ because someone has to be rational here."
      ];
      const body = [
        "Tell me what happened + what you want (friends, talking stage, dating).",
        "",
        "Quick rules:",
        "• if they like you, it won’t feel confusing 24/7",
        "• match energy—don’t chase",
        "• green flags: consistent, respectful, clear",
        "• red flags: hot/cold, pressures you, rude",
        "",
        "If anything feels unsafe, talk to a trusted adult 💗"
      ].join("\n");
      return pick(openers) + "\n\n" + body;
    }

    function replyGeneral(userText){
      const t = normalize(userText);
      const wset = new Set(wordsOf(t));

      // greetings
      if (/^(hi|hey|hello|yo|hiii|hiya)\b/.test(t)) return pick(sass.greetings);

      // thanks
      if (containsAnyWord(wset, ["thanks","thank","thx","ty"])) return pick(sass.thanks);

      // compliments
      if (t.includes("cute") || t.includes("love you") || t.includes("pretty") || t.includes("slay") || t.includes("icon")) {
        return pick(sass.compliments);
      }

      // math
      const math = tryMath(userText);
      if (math !== null) {
        const snark = [
          `It’s ${math}. ✿ math ate, you didn’t even have to.`,
          `${math}. next question, your honor.`,
          `${math}. i fear i’m basically a calculator with eyeliner.`
        ];
        return pick(snark);
      }

      // fallback
      const prefix = pick(sass.fallback);
      const follow = [
        "",
        "Tell me what you need and add details (what you tried, what you want, any constraints).",
        "I’ll respond with the best answer i can ✿"
      ].join("\n");
      return prefix + "\n" + follow;
    }

    function generateReply(userText){
      const cat = detectCategory(userText);
      if (cat === "hair tips") return replyHair();
      if (cat === "makeup tips") return replyMakeup();
      if (cat === "weight management") return replyWeight();
      if (cat === "studying help") return replyStudy();
      if (cat === "boy tips") return replyBoy();
      return replyGeneral(userText);
    }

    // ---------- Send ----------
    function send(){
      const text = input.value.trim();
      if(!text) return;

      addBubble(text, "you");
      input.value = "";
      autoGrow(input);

      addTyping();

      setTimeout(() => {
        removeTyping();
        addBubble(generateReply(text), "bbg");
      }, 420);
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    // intro
    addBubble(
      "hi bestie ✿ i’m ChatBBG.\nI can help with anything, but I do have limitations due to being created by a 15 year old.\n\ntry: “what’s 2+2?” or “makeup tips for oily skin” 😌",
      "bbg"
    );
  </script>
</body>
</html>
