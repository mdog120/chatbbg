<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBBG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@500;600&display=swap" rel="stylesheet">

  <script defer src="https://cdn.jsdelivr.net/npm/mathjs@12.4.2/lib/browser/math.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/all.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.min.js"></script>

  <style>
    :root{
      --bg1:#fffafc;
      --bg2:#fff1f7;
      --panel:#ffffffee;
      --line:#f1d8e5;
      --text:#2a1f28;
      --muted:#7d6775;
      --pink:#ff77b7;
      --pink2:#ffb6d8;
      --bot:#fff8fb;
      --user:#ffe4f1;
      --shadow:0 18px 45px rgba(83, 34, 63, 0.10);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:"DM Sans", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #ffe8f2 0%, transparent 35%),
        radial-gradient(circle at bottom right, #ffeef8 0%, transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:min(960px, 100%);
      height:92vh;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      padding:22px 24px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(to bottom, rgba(255,255,255,0.96), rgba(255,250,252,0.92));
    }

    .brand{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      margin:0;
      font-family:"Fraunces", serif;
      font-size:30px;
      font-weight:600;
      letter-spacing:0.3px;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      max-width:720px;
    }

    .pill{
      border:1px solid #f3cfe0;
      background:#fff6fa;
      color:#8e5c78;
      padding:9px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
    }

    .suggestions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .chip{
      border:none;
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font:inherit;
      font-size:13px;
      transition:0.18s ease;
    }

    .chip:hover{
      transform:translateY(-1px);
      background:#fff6fa;
      border-color:#efbfd6;
    }

    .chat{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:14px;
      scroll-behavior:smooth;
    }

    .row{
      display:flex;
    }

    .row.user-row{
      justify-content:flex-end;
    }

    .bubble{
      max-width:min(80%, 720px);
      padding:15px 17px;
      border-radius:22px;
      line-height:1.6;
      font-size:15px;
      white-space:pre-wrap;
      word-wrap:break-word;
      border:1px solid var(--line);
      box-shadow:0 8px 18px rgba(64, 27, 48, 0.04);
    }

    .bubble.bot{
      background:var(--bot);
      border-top-left-radius:8px;
    }

    .bubble.user{
      background:var(--user);
      border-color:#f0bfd7;
      border-top-right-radius:8px;
    }

    .meta{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .typing{
      display:inline-flex;
      gap:6px;
      align-items:center;
      padding:4px 0;
    }

    .typing span{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--pink);
      display:inline-block;
      animation:bounce 1s infinite ease-in-out;
    }

    .typing span:nth-child(2){ animation-delay:0.15s; }
    .typing span:nth-child(3){ animation-delay:0.3s; }

    @keyframes bounce{
      0%,100%{ transform:translateY(0); opacity:0.45; }
      50%{ transform:translateY(-4px); opacity:1; }
    }

    .input-area{
      border-top:1px solid var(--line);
      padding:18px 20px 20px;
      background:rgba(255,255,255,0.96);
    }

    .input-box{
      display:flex;
      gap:12px;
      align-items:flex-end;
      border:1px solid var(--line);
      background:#fff;
      border-radius:26px;
      padding:10px;
      box-shadow:0 10px 24px rgba(83, 34, 63, 0.06);
    }

    textarea{
      flex:1;
      border:none;
      outline:none;
      resize:none;
      min-height:54px;
      max-height:170px;
      font:inherit;
      font-size:15px;
      line-height:1.5;
      padding:12px 12px;
      background:transparent;
      color:var(--text);
    }

    .send-btn{
      border:none;
      width:54px;
      height:54px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--pink), #ff9fcc);
      color:white;
      cursor:pointer;
      font-size:18px;
      font-weight:700;
      box-shadow:0 10px 20px rgba(255,119,183,0.28);
      transition:0.18s ease;
      flex-shrink:0;
    }

    .send-btn:hover{
      transform:translateY(-1px) scale(1.02);
    }

    .footer-note{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      padding:0 6px;
    }

    @media (max-width:700px){
      body{
        padding:10px;
      }

      .container{
        height:96vh;
        border-radius:22px;
      }

      .topbar{
        padding:18px 16px 14px;
      }

      .chat{
        padding:16px;
      }

      .bubble{
        max-width:90%;
      }

      .title-wrap h1{
        font-size:25px;
      }

      .chip{
        font-size:12px;
        padding:9px 12px;
      }

      textarea{
        min-height:50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="title-wrap">
          <h1>ChatBBG ✿</h1>
          <p>
            your rule-based chatbot bestie. ask for study tips, flashcards, motivation, beauty advice,
            outfit ideas, math, calculus, or just random things :)
          </p>
        </div>
        <div class="pill">pre-made topic starters</div>
      </div>

      <div class="suggestions">
        <button class="chip" onclick="fillPrompt('hi')">hi</button>
        <button class="chip" onclick="fillPrompt('give me study tips')">study tips</button>
        <button class="chip" onclick="fillPrompt('flashcards for biology cells')">flashcards</button>
        <button class="chip" onclick="fillPrompt('give me a motivational quote')">motivation</button>
        <button class="chip" onclick="fillPrompt('what should i wear today')">outfit ideas</button>
        <button class="chip" onclick="fillPrompt('hair tips for frizz')">hair tips</button>
        <button class="chip" onclick="fillPrompt('blush tips')">makeup tips</button>
        <button class="chip" onclick="fillPrompt('2+2*5')">math</button>
        <button class="chip" onclick="fillPrompt('derivative of x^2')">derivative</button>
        <button class="chip" onclick="fillPrompt('integral of 2*x dx')">integral</button>
      </div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="input" placeholder="message ChatBBG... try: flashcards for photosynthesis / study tips / 2+2 / integral of x^2 dx"></textarea>
        <button class="send-btn" onclick="send()">➜</button>
      </div>
      <div class="footer-note">
        <span>enter = send • shift+enter = new line</span>
      </div>
    </div>
  </div>

  <script>
    // ChatBBG ✿
    // this is my chatbot project
    // it uses rule-based logic instead of real AI
    // i used lists, functions, parameters, loops, and if statements
    // i also added flashcards using pre-made data

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    // this makes the text area grow when the user types more
    function autoGrow() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 170) + "px";
    }

    input.addEventListener("input", autoGrow);

    input.addEventListener("keydown", function(e){
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    function fillPrompt(text){
      input.value = text;
      autoGrow();
      input.focus();
    }

    // this list stores different short message types and replies
    const INTENTS = [
      {
        name: "greeting",
        match: ["hi","hello","hey","hii","hiii","yo","sup"],
        replies: [
          "hi bestie ✿ what’s the vibe today?",
          "heyyy ✿ what do you need help with?",
          "hiii angel ✿ i’m here."
        ]
      },
      {
        name: "bye",
        match: ["bye","goodbye","cya","ttyl","see ya","later","gn","goodnight"],
        replies: [
          "bye bestie ✿ go be iconic.",
          "ttyl ✿ don’t forget how cute and smart you are.",
          "goodnight ✿ rest and recharge."
        ]
      },
      {
        name: "laugh",
        match: ["lol","lmao","haha","hehe","😭","💀"],
        replies: [
          "STOPPP 💀",
          "ur so real for that 😭",
          "okay wait that was actually funny."
        ]
      },
      {
        name: "thanks",
        match: ["thanks","thank you","ty","thx"],
        replies: [
          "ofc ✿",
          "always bestie ✿",
          "you’re welcomee."
        ]
      },
      {
        name: "help",
        match: ["help","what can you do","commands","who are you"],
        replies: [
          "i can help with study tips, flashcards, motivation, beauty, outfits, math, and calculus ✿",
          "try asking:\n• flashcards for biology cells\n• study tips\n• hair tips for frizz\n• what should i wear today?\n• 2+2\n• derivative of x^2"
        ]
      }
    ];

    // this list stores bigger categories with keywords and replies
    const routes = [
      {
        name: "studying",
        words: ["study","studying","exam","test","quiz","homework","school","assignment","notes","focus","revision"],
        replies: [
          "study mode ✿ try this:\n1. 25 minutes focused\n2. 5 minute break\n3. quiz yourself after\n4. repeat",
          "i’m more of a study helper than a full teacher 😭\n\nbut i can help with study methods, flashcards, and practice ideas.",
          "best study tip? active recall. don’t just reread — actually test yourself."
        ]
      },
      {
        name: "hair",
        words: ["hair","frizz","curly","curl","straight","shampoo","conditioner","scalp","split ends"],
        replies: [
          "hair tip ✿ use leave-in conditioner and try not to overdo heat.",
          "for frizz: microfiber towel, less brushing, and a light hair oil on the ends.",
          "tell me your hair type and i’ll give better tips ✿"
        ]
      },
      {
        name: "makeup",
        words: ["makeup","blush","concealer","foundation","mascara","brows","eyeliner","lip gloss","lipstick"],
        replies: [
          "makeup tip ✿ blush placement changes everything honestly.",
          "for a softer look: lighter base, cream blush, and gloss.",
          "if your makeup looks cakey, use less product and blend with a damp sponge."
        ]
      },
      {
        name: "fashion",
        words: ["outfit","wear","clothes","fashion","style","jeans","dress","cute outfit","aesthetic"],
        replies: [
          "outfit idea ✿ fitted top + loose jeans + cute jewelry = always works.",
          "if you don’t know what to wear, start with one main piece and build around it.",
          "tell me where you’re going and i’ll suggest an outfit vibe ✿"
        ]
      },
      {
        name: "motivation",
        words: ["motivation","motivational","quote","confidence","affirmation","sad","stressed","anxious","low","upset"],
        replies: [
          "affirmation time ✿ you do not need to be perfect to be worthy.",
          "deep breath bestie ✿ one bad moment does not ruin your whole day.",
          "you’ve survived 100% of your hardest days so far. that’s kind of iconic."
        ]
      },
      {
        name: "boy advice",
        words: ["boy","crush","dating","relationship","situationship","ghosted","text him","he likes me","red flag"],
        replies: [
          "boy advice ✿ if he likes you, it should not be confusing 24/7.",
          "match energy. don’t overchase someone giving half effort.",
          "red flag check ✿ inconsistency, mixed signals, and only texting when bored."
        ]
      },
      {
        name: "self care",
        words: ["self care","glow up","routine","skin","skincare","face wash","acne","oily skin","dry skin"],
        replies: [
          "glow-up tip ✿ consistency matters more than doing the most.",
          "basic skincare is enough: cleanser, moisturizer, sunscreen.",
          "for a reset day: shower, clean room, fresh clothes, water, and music."
        ]
      }
    ];

    // this list stores fallback replies
    const fallbackReplies = [
      "wait say more ✿ i need context.",
      "okayyy tell me a little more so i can help better.",
      "hmm i’m not fully getting it yet — try asking in a different way.",
      "i can help with study tips, flashcards, mood support, outfits, beauty, math, and more ✿"
    ];

    // this list stores pre-made flashcards by topic
    const flashcardTopics = [
      {
        topic: "biology cells",
        keywords: ["biology cells","cells","cell"],
        cards: [
          { front: "What is the cell membrane?", back: "It controls what enters and leaves the cell." },
          { front: "What does the nucleus do?", back: "It stores DNA and controls cell activities." },
          { front: "What do mitochondria do?", back: "They release energy from food." }
        ]
      },
      {
        topic: "photosynthesis",
        keywords: ["photosynthesis"],
        cards: [
          { front: "What is photosynthesis?", back: "It is the process plants use to make food using sunlight." },
          { front: "What gas do plants take in for photosynthesis?", back: "Carbon dioxide." },
          { front: "What gas do plants release?", back: "Oxygen." }
        ]
      },
      {
        topic: "quadratic equations",
        keywords: ["quadratic equations","quadratics","quadratic"],
        cards: [
          { front: "What is the standard form of a quadratic?", back: "ax² + bx + c = 0" },
          { front: "What is the quadratic formula?", back: "x = (-b ± √(b² - 4ac)) / 2a" },
          { front: "What does the discriminant tell you?", back: "It tells you how many real solutions the quadratic has." }
        ]
      },
      {
        topic: "french revolution",
        keywords: ["french revolution"],
        cards: [
          { front: "When did the French Revolution begin?", back: "1789" },
          { front: "What was one major cause of the French Revolution?", back: "Unfair social classes and financial problems." },
          { front: "What prison was stormed in 1789?", back: "The Bastille." }
        ]
      },
      {
        topic: "python basics",
        keywords: ["python basics","python"],
        cards: [
          { front: "What symbol is used for comments in Python?", back: "#" },
          { front: "What does print() do?", back: "It displays output on the screen." },
          { front: "What is a variable?", back: "A named place to store data." }
        ]
      }
    ];

    function pickRandom(list){
      return list[Math.floor(Math.random() * list.length)];
    }

    // this checks short intent messages like hi or bye
    function detectIntent(text){
      const lower = text.toLowerCase().trim();

      for(let intent of INTENTS){
        for(let phrase of intent.match){
          if(lower === phrase || lower.includes(phrase)){
            return intent;
          }
        }
      }

      return null;
    }

    // this checks bigger advice/support categories
    function detectCategory(text){
      const lower = text.toLowerCase();

      for(let route of routes){
        for(let word of route.words){
          if(lower.includes(word)){
            return route;
          }
        }
      }

      return null;
    }

    // this finds a flashcard topic based on what the user typed
    function findFlashcardTopic(userText){
      const lower = userText.toLowerCase();

      for(let topic of flashcardTopics){
        for(let keyword of topic.keywords){
          if(lower.includes(keyword)){
            return topic;
          }
        }
      }

      return null;
    }

    // this formats the flashcards into a readable chatbot reply
    function makeFlashcardReply(topicObject){
      let reply = "flashcards for " + topicObject.topic + " ✿\n\n";

      for(let i = 0; i < topicObject.cards.length; i++){
        reply += "card " + (i + 1) + "\n";
        reply += "front: " + topicObject.cards[i].front + "\n";
        reply += "back: " + topicObject.cards[i].back + "\n\n";
      }

      reply += "you can also ask for another topic like:\n";
      reply += "• flashcards for photosynthesis\n";
      reply += "• flashcards for quadratic equations\n";
      reply += "• flashcards for french revolution";

      return reply;
    }

    // this checks whether the user asked for flashcards
    function tryFlashcards(userText){
      const lower = userText.toLowerCase();

      if(lower.includes("flashcards")){
        const foundTopic = findFlashcardTopic(userText);

        if(foundTopic){
          return makeFlashcardReply(foundTopic);
        } else {
          return "i can do flashcards for these topics right now ✿\n\n• biology cells\n• photosynthesis\n• quadratic equations\n• french revolution\n• python basics\n\ntry typing something like: flashcards for photosynthesis";
        }
      }

      return null;
    }

    // this checks if the user typed a math or calculus question
    function tryMath(userText){
      const lower = userText.toLowerCase().trim();

      try{
        let integralMatch = lower.match(/^integral of (.+) d([a-z])$/i);
        if(integralMatch){
          const expression = integralMatch[1];
          const variable = integralMatch[2];
          const result = nerdamer.integrate(expression, variable).toString();
          return "integral result ✿\n∫ " + expression + " d" + variable + " = " + result + " + C";
        }

        let derivativeMatch = lower.match(/^derivative of (.+)$/i);
        if(derivativeMatch){
          const expression = derivativeMatch[1];
          const result = nerdamer.diff(expression, "x").toString();
          return "derivative result ✿\nd/dx(" + expression + ") = " + result;
        }

        const hasNumber = /\d/.test(userText);
        const hasOperator = /[\+\-\*\/\^\(\)]/.test(userText);

        if(hasNumber && hasOperator){
          const answer = math.evaluate(userText);
          return "math result ✿\n" + userText + " = " + answer;
        }
      } catch(error){
        return "hmm the math on that is being dramatic 😭 try something like:\n• 2+2*5\n• derivative of x^2\n• integral of 2*x dx";
      }

      return null;
    }

    // this is the main function
    // it takes the user message as a parameter and decides what reply to return
    function generateReply(userText){
      let flashcardReply = tryFlashcards(userText);
      if(flashcardReply){
        return flashcardReply;
      }

      let mathReply = tryMath(userText);
      if(mathReply){
        return mathReply;
      }

      let foundIntent = detectIntent(userText);
      if(foundIntent){
        return pickRandom(foundIntent.replies);
      }

      let foundCategory = detectCategory(userText);
      if(foundCategory){
        return pickRandom(foundCategory.replies);
      }

      return pickRandom(fallbackReplies);
    }

    function addMessage(text, type){
      const row = document.createElement("div");
      row.className = type === "user" ? "row user-row" : "row";

      const bubble = document.createElement("div");
      bubble.className = "bubble " + type;
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = type === "user" ? "You • just now" : "ChatBBG • just now";

      bubble.appendChild(meta);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping(){
      const row = document.createElement("div");
      row.className = "row";
      row.id = "typingRow";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.innerHTML = `
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
        <div class="meta">ChatBBG • typing...</div>
      `;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping(){
      const typingRow = document.getElementById("typingRow");
      if(typingRow){
        typingRow.remove();
      }
    }

    function send(){
      const text = input.value.trim();

      if(text === ""){
        return;
      }

      addMessage(text, "user");
      input.value = "";
      autoGrow();

      showTyping();

      setTimeout(function(){
        removeTyping();
        const reply = generateReply(text);
        addMessage(reply, "bot");
      }, 450);
    }

    addMessage(
`hi bestie ✿ i’m ChatBBG.

you can ask me stuff like:
• "give me study tips"
• "flashcards for biology cells"
• "flashcards for photosynthesis"
• "what should i wear today?"
• "hair tips for frizz"
• "blush tips"
• "i'm stressed"
• "2+2*5"
• "derivative of x^2"
• "integral of 2*x dx"

i’m rule-based, not real AI, so my flashcards work best with the topics i already know ✿`,
    "bot");
  </script>
</body>
</html>
